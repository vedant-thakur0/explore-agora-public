{% extends "base.html" %}
{% block title %}Entity Dictionary - AGORA NER{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Entity Dictionary</h1>
  <button id="btn-export" class="btn btn-primary">Export for Pipeline</button>
</div>

<div class="filters">
  <input type="text" id="dict-search" placeholder="Search entities..." />
  <select id="dict-type-filter">
    <option value="">All types</option>
    <option value="organizations">Organizations</option>
    <option value="offices">Offices</option>
    <option value="roles">Roles</option>
    <option value="legislation_refs">Legislation Refs</option>
    <option value="named_docs">Named Docs</option>
  </select>
  <span id="dict-count" class="count-badge"></span>
  <button id="btn-merge" class="btn btn-sm" disabled>Merge Selected</button>
</div>

<table class="doc-table" id="dict-table">
  <thead>
    <tr>
      <th><input type="checkbox" id="select-all" /></th>
      <th>Canonical Name</th>
      <th>Type</th>
      <th>Acronym</th>
      <th>Aliases</th>
      <th>Soft Aliases</th>
      <th>Mentions</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="dict-tbody"></tbody>
</table>

<!-- Edit modal -->
<div id="edit-modal" class="modal hidden">
  <div class="modal-content">
    <h3>Edit Entity</h3>
    <input type="hidden" id="edit-id" />
    <label>Canonical Name <input type="text" id="edit-name" /></label>
    <label>Acronym <input type="text" id="edit-acronym" /></label>
    <label>Aliases (comma-separated) <input type="text" id="edit-aliases" /></label>
    <label>Soft Aliases (comma-separated) <input type="text" id="edit-soft-aliases" /></label>
    <label>Type
      <select id="edit-type">
        <option value="organizations">Organizations</option>
        <option value="offices">Offices</option>
        <option value="roles">Roles</option>
        <option value="legislation_refs">Legislation Refs</option>
        <option value="named_docs">Named Docs</option>
      </select>
    </label>
    <div class="popover-actions">
      <button id="edit-save" class="btn btn-primary btn-sm">Save</button>
      <button id="edit-cancel" class="btn btn-sm">Cancel</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='dictionary.js') }}?v={{ cache_bust }}"></script>
{% endblock %}
